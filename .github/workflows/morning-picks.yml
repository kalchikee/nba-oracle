name: Morning Picks

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  morning-picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit predictions/<date>.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get today's date (ET)
        id: date
        run: echo "date=$(TZ='America/New_York' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: data/nba_oracle.db
          key: nba-oracle-db-${{ github.run_id }}
          restore-keys: |
            nba-oracle-db-

      - name: Install dependencies
        run: npm ci

      - name: Run morning pipeline and alert
        run: npm run alerts:morning
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          KALSHI_MIN_PROB: '0.58'
          LOG_LEVEL: info

      - name: Commit predictions JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions/${{ steps.date.outputs.date }}.json || true
          if ! git diff --staged --quiet; then
            git commit -m "NBA predictions ${{ steps.date.outputs.date }}"
            git push
          else
            echo "No predictions file to commit"
          fi

      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/nba_oracle.db
          key: nba-oracle-db-${{ github.run_id }}
