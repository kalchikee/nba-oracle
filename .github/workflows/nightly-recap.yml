name: Nightly Recap

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  nightly-recap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: data/nba_oracle.db
          key: nba-oracle-db-${{ github.run_id }}
          restore-keys: |
            nba-oracle-db-

      - name: Install dependencies
        run: npm ci

      - name: Run nightly recap
        run: npm run alerts:recap
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LOG_LEVEL: info

      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/nba_oracle.db
          key: nba-oracle-db-${{ github.run_id }}
