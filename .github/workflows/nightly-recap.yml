name: Nightly Recap

on:
  schedule:
    - cron: '0 7 * * *'    # 1:00 AM CST (UTC-6) | 2:00 AM CDT (UTC-5) during daylight saving
  workflow_dispatch:        # Manual trigger for testing

jobs:
  nightly-recap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Download the DB saved by the morning workflow
      - name: Restore database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: nba-oracle-db
          path: data/
          if_no_artifact_found: ignore
          workflow_conclusion: ''
        continue-on-error: true

      - name: Install dependencies
        run: npm ci

      - name: Run nightly recap
        run: npm run alerts:recap
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LOG_LEVEL: info

      # Save updated DB (with result accuracy logged)
      - name: Save database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nba-oracle-db
          path: data/nba_oracle.db
          retention-days: 7
          overwrite: true
